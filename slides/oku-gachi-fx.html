<header>億勝ちFX ｜ 10年負け続けた凡人がたどり着いた「型と戦略」</header>
<h2 id="%E3%81%93%E3%81%AE%E3%82%B9%E3%83%A9%E3%82%A4%E3%83%89%E3%81%AB%E3%81%A4%E3%81%84%E3%81%A6">このスライドについて</h2>
<ul>
<li><strong>目的</strong>：書籍『億勝ちFX』の要点を章ごとに整理し、短時間で全体像を掴めるようにする</li>
<li><strong>対象</strong>：
<ul>
<li>ある程度勉強したのに勝てない初心者〜中級トレーダー</li>
<li>スイングトレードを軸に学びたい人</li>
<li>自分の手法に「軸」を作りたい人</li>
</ul>

<li><strong>「V 字 + 停滞」</strong> のセットで判断するのが安全</li>
</ul>

<h2 id="%E5%88%A9%E7%9B%8A%E7%A2%BA%E5%AE%9A%E3%81%AF%E8%B3%87%E7%94%A3%E5%BD%A2%E6%88%90%E3%81%AE%E5%91%BD%E7%B6%B1">利益確定は「資産形成の命綱」</h2>

</ul>
</li>
</ul>

<h2 id="%E3%83%88%E3%83%AC%E3%83%BC%E3%83%89%E3%81%AF%E5%BC%B5%E3%82%8B%E3%81%B9%E3%81%8D%E7%9E%AC%E9%96%93%E3%81%A0%E3%81%91%E3%82%92%E7%8B%99%E3%81%86%E3%82%B2%E3%83%BC%E3%83%A0">トレードは「張るべき瞬間だけ」を狙うゲーム</h2>
<ul>
<li>ルール上は1日何千回でも取引可能 → <strong>この自由さが最も難しい</strong></li>
<li>実際にチャンスと言える場面は <strong>1日数回あるかないか</strong></li>
<li>スイングなら「今日は1度もなかった」も普通</li>
</ul>
<h3 id="%E3%82%B9%E3%83%97%E3%83%AC%E3%83%83%E3%83%89%E3%82%B3%E3%82%B9%E3%83%88%E3%81%AE%E7%8F%BE%E5%AE%9F">スプレッドコストの現実</h3>
<ul>
<li>1日5回 × 月20営業日 × 1pips = <strong>月100pips が消える</strong></li>
<li>100万通貨換算で <strong>年間1,000万円規模のコスト</strong></li>
</ul>
<p>優位性のない取引は、続けるほど確実に資金を削る。</p>
